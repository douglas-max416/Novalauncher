name: Build NovaLauncher APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: ⬇️ Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar"

      - name: 🔑 Make gradlew executable
        run: chmod +x gradlew

      - name: 🔧 Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

      - name: 📲 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NovaLauncher-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "NovaLauncher v1.0.${{ github.run_number }}"
          body: |
            Download app-debug.apk below and install on your phone!
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
